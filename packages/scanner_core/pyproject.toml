[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "scanner_core"
version = "0.1.0"
requires-python = ">=3.11"

# The package code lives flat in this directory (this dir *is* the
# `scanner_core` package), so map the import name to "." explicitly.
[tool.setuptools]
packages = ["scanner_core"]

[tool.setuptools.package-dir]
"scanner_core" = "."